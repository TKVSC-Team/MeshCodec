name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux
            shell: bash
            cc: gcc
            cxx: g++
          - os: macos-latest
            name: macos
            shell: bash
            cc: clang
            cxx: clang++
          - os: windows-latest
            name: windows
            shell: msys2 {0}
            msystem: MINGW64
            cc: gcc
            cxx: g++

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: ${{ matrix.shell }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSYS2
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=${{ matrix.cc }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.cxx }} \
            -DZSTD_BUILD_SHARED=OFF \
            -DZSTD_BUILD_PROGRAMS=OFF \
            -DZSTD_STATIC_LINKING_ONLY=ON \
            -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mc_decompress-${{ matrix.name }}
          path: |
            build/tests/mc_decompress
            build/tests/mc_decompress.exe
          if-no-files-found: error
